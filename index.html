<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>因數雙模探索器</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            touch-action: manipulation;
        }
        h1 { color: #333; margin-bottom: 20px; }

        /* 頂部模式切換開關 */
        .mode-toggle {
            display: inline-flex;
            background: #e0e0e0;
            border-radius: 30px;
            padding: 5px;
            margin-bottom: 25px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }
        .mode-btn {
            padding: 10px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            background: transparent;
            color: #777;
            transition: 0.3s;
        }
        .mode-btn.active {
            background: #4CAF50;
            color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* 共同容器樣式 */
        .container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 650px;
            margin: 0 auto;
        }
        .hidden { display: none !important; }

        /* ================= 教學模式樣式 ================= */
        .control-group { margin: 15px 0; font-size: 1.2rem; font-weight: bold; color: #555;}
        input[type="number"] { font-size: 1.5rem; width: 80px; text-align: center; border: 2px solid #ccc; border-radius: 8px; margin-left: 10px; }
        input[type="range"] { width: 100%; margin: 20px 0; height: 40px; cursor: pointer; }
        
        .grid-display {
            display: flex; justify-content: center; overflow-x: auto; padding: 20px 0; min-height: 200px;
        }
        #teachGrid { transition: all 0.3s ease; }
        .block {
            width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 1.1rem; box-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }
        .perfect { background-color: #4CAF50; border: 2px solid #388E3C; } 
        .imperfect-main { background-color: #2196F3; border: 2px solid #1976D2; }
        .imperfect-remainder { background-color: #F44336; border: 2px solid #D32F2F; } 
        .ghost-block { background-color: transparent; border: 2px dashed #B0BEC5; color: #90A4AE; box-shadow: none; }
        
        .msg-box { font-size: 1.3rem; font-weight: bold; padding: 15px; border-radius: 10px; margin-top: 15px; line-height: 1.5; }
        .msg-success { background: #E8F5E9; color: #2E7D32; }
        .msg-error { background: #FFF3E0; color: #E65100; }
        .math-eq { font-family: monospace; font-size: 1.6rem; background: rgba(255,255,255,0.6); padding: 5px 10px; border-radius: 8px; display: inline-block; margin-top: 5px; }

        /* ================= 遊戲模式樣式 ================= */
        .game-header { background: #34495e; color: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .game-title { font-size: 1.6rem; color: #f1c40f; margin: 0 0 10px 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);}
        .game-stats { display: flex; justify-content: space-around; font-size: 1.2rem; font-weight: bold; }
        
        .number-board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        .num-btn {
            aspect-ratio: 1;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            background: #ecf0f1;
            color: #2c3e50;
            cursor: pointer;
            box-shadow: 0 4px 0 #bdc3c7;
            transition: 0.1s;
        }
        .num-btn:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 0 0 #bdc3c7; }
        .num-btn:disabled { cursor: not-allowed; }
        
        .num-correct { background: #2ecc71 !important; color: white !important; box-shadow: 0 2px 0 #27ae60 !important; transform: translateY(2px); }
        .num-wrong { background: #e74c3c !important; color: white !important; box-shadow: 0 2px 0 #c0392b !important; transform: translateY(2px); animation: shake 0.3s; }
        .num-missed { background: #f1c40f !important; color: #2c3e50 !important; box-shadow: 0 2px 0 #f39c12 !important; border: 2px dashed #d35400; }

        @keyframes shake { 0%, 100% { transform: translateX(0) translateY(2px); } 25% { transform: translateX(-5px) translateY(2px); } 75% { transform: translateX(5px) translateY(2px); } }

        .btn-action { background: #FF9800; color: white; border: none; padding: 12px 25px; font-size: 1.2rem; font-weight: bold; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 0 #F57C00; }
        .btn-action:active { transform: translateY(4px); box-shadow: 0 0 0 #F57C00; }
        
        .game-msg { display: none; padding: 15px; border-radius: 10px; font-size: 1.4rem; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>

    <h1>🔍 因數探索器</h1>

    <div class="mode-toggle">
        <button id="btnModeTeach" class="mode-btn active" onclick="setMode('teach')">教學模式</button>
        <button id="btnModeGame" class="mode-btn" onclick="setMode('game')">遊戲模式</button>
    </div>

    <div id="teachContainer" class="container">
        <div class="control-group">
            <label>被除數 (目標數字)： <input type="number" id="teachTarget" value="12" min="1" max="60"></label>
        </div>
        <div class="control-group">
            <label>除數 (試著排成 <span id="teachRowVal" style="color: #2196F3; font-size: 1.5rem;">3</span> 行)</label>
            <input type="range" id="teachSlider" min="1" max="12" value="3">
        </div>

        <div class="grid-display">
            <div id="teachGrid"></div>
        </div>

        <div id="teachMsg" class="msg-box msg-success">
            可以排成完美的長方形！<br><span class="math-eq">12 ÷ 3 = 4</span>
        </div>
    </div>

    <div id="gameContainer" class="container hidden">
        <div class="game-header">
            <h2 class="game-title" id="gameTaskTitle">任務：找出 ? 的所有因數</h2>
            <div class="game-stats">
                <div>愛心：<span id="gameLives">❤️❤️❤️</span></div>
                <div>進度：<span id="gameFound">0</span> / <span id="gameTotal">0</span></div>
            </div>
        </div>

        <div id="gameEndMsg" class="game-msg"></div>

        <div class="number-board" id="gameBoard"></div>

        <button class="btn-action" onclick="initGame()">換一題挑戰</button>
    </div>

    <script>
        // --- 全局模式切換 ---
        function setMode(mode) {
            const btnTeach = document.getElementById('btnModeTeach');
            const btnGame = document.getElementById('btnModeGame');
            const contTeach = document.getElementById('teachContainer');
            const contGame = document.getElementById('gameContainer');

            if (mode === 'teach') {
                btnTeach.classList.add('active');
                btnGame.classList.remove('active');
                contTeach.classList.remove('hidden');
                contGame.classList.add('hidden');
                updateTeachGrid();
            } else {
                btnGame.classList.add('active');
                btnTeach.classList.remove('active');
                contGame.classList.remove('hidden');
                contTeach.classList.add('hidden');
                initGame();
            }
        }

        // ================= 教學模式邏輯 =================
        const tTarget = document.getElementById('teachTarget');
        const tSlider = document.getElementById('teachSlider');
        const tRowVal = document.getElementById('teachRowVal');
        const tGrid = document.getElementById('teachGrid');
        const tMsg = document.getElementById('teachMsg');

        function updateTeachGrid() {
            let total = parseInt(tTarget.value) || 1;
            let rows = parseInt(tSlider.value) || 1;
            if (total > 100) { total = 100; tTarget.value = 100; }
            tSlider.max = total;
            if (rows > total) { rows = total; tSlider.value = total; }
            
            tRowVal.textContent = rows;
            tGrid.innerHTML = '';
            
            tGrid.style.display = 'grid';
            tGrid.style.gridTemplateRows = `repeat(${rows}, 40px)`;
            tGrid.style.gridAutoFlow = 'column';
            tGrid.style.gap = '6px';

            const isFactor = (total % rows === 0);
            const cols = Math.floor(total / rows);
            const rem = total % rows;
            const missing = isFactor ? 0 : rows - rem;

            for (let i = 0; i < total; i++) {
                const b = document.createElement('div');
                b.className = 'block ' + (isFactor ? 'perfect' : (i < cols * rows ? 'imperfect-main' : 'imperfect-remainder'));
                b.textContent = i + 1;
                tGrid.appendChild(b);
            }
            if (!isFactor) {
                for (let i = 0; i < missing; i++) {
                    const gb = document.createElement('div');
                    gb.className = 'block ghost-block';
                    gb.textContent = '缺';
                    tGrid.appendChild(gb);
                }
            }

            if (isFactor) {
                tMsg.className = 'msg-box msg-success';
                tMsg.innerHTML = `完美長方形！沒有餘數，所以 <b>${rows} 是 ${total} 的因數</b>。<br><span class="math-eq">${total} ÷ ${rows} = ${cols}</span>`;
            } else {
                tMsg.className = 'msg-box msg-error';
                tMsg.innerHTML = `排不滿長方形，多出 ${rem} 個。有餘數，所以 <b>${rows} 不是 ${total} 的因數</b>。<br><span class="math-eq">${total} ÷ ${rows} = ${cols} ... ${rem}</span>`;
            }
        }

        tTarget.addEventListener('input', updateTeachGrid);
        tSlider.addEventListener('input', updateTeachGrid);

        // ================= 遊戲模式邏輯 =================
        const gTitle = document.getElementById('gameTaskTitle');
        const gLivesUI = document.getElementById('gameLives');
        const gFoundUI = document.getElementById('gameFound');
        const gTotalUI = document.getElementById('gameTotal');
        const gBoard = document.getElementById('gameBoard');
        const gEndMsg = document.getElementById('gameEndMsg');

        let gTarget = 0;
        let gFactors = [];
        let gFoundCount = 0;
        let gLives = 3;
        let gIsOver = false;

        function initGame() {
            gEndMsg.style.display = 'none';
            gBoard.innerHTML = '';
            gLives = 3;
            gFoundCount = 0;
            gIsOver = false;
            updateGameUI();

            // 題庫：適合練習因數的數字
            const pool = [12, 16, 18, 20, 24, 28, 30, 32, 36, 40];
            gTarget = pool[Math.floor(Math.random() * pool.length)];
            gTitle.innerHTML = `任務：找出 <span style="font-size: 2rem;">${gTarget}</span> 的所有因數`;

            // 計算所有因數
            gFactors = [];
            for (let i = 1; i <= gTarget; i++) {
                if (gTarget % i === 0) gFactors.push(i);
            }
            gTotalUI.textContent = gFactors.length;

            // 產生 1 到 目標數字 的按鈕面板
            for (let i = 1; i <= gTarget; i++) {
                const btn = document.createElement('button');
                btn.className = 'num-btn';
                btn.textContent = i;
                btn.onclick = () => handleGameClick(btn, i);
                gBoard.appendChild(btn);
            }
        }

        function handleGameClick(btn, num) {
            if (gIsOver || btn.disabled) return;
            btn.disabled = true;

            if (gTarget % num === 0) {
                // 答對了：是因數
                btn.classList.add('num-correct');
                gFoundCount++;
                updateGameUI();
                
                if (gFoundCount === gFactors.length) {
                    endGame(true);
                }
            } else {
                // 答錯了：不是因數
                btn.classList.add('num-wrong');
                gLives--;
                updateGameUI();
                
                if (gLives <= 0) {
                    endGame(false);
                }
            }
        }

        function updateGameUI() {
            gLivesUI.textContent = '❤️'.repeat(gLives) + '💔'.repeat(3 - gLives);
            gFoundUI.textContent = gFoundCount;
        }

        function endGame(isWin) {
            gIsOver = true;
            gEndMsg.style.display = 'block';
            
            // 鎖定所有按鈕
            const btns = gBoard.querySelectorAll('.num-btn');
            btns.forEach(b => b.disabled = true);

            if (isWin) {
                gEndMsg.className = 'game-msg msg-success';
                gEndMsg.textContent = '🎉 挑戰成功！你找齊了所有因數！';
            } else {
                gEndMsg.className = 'game-msg msg-error';
                gEndMsg.textContent = '💥 挑戰失敗，愛心扣光了！黃色的數字是你沒找出來的因數喔。';
                
                // 失敗時，提示漏掉的因數
                btns.forEach((b, idx) => {
                    let num = idx + 1;
                    if (gTarget % num === 0 && !b.classList.contains('num-correct')) {
                        b.classList.add('num-missed');
                    }
                });
            }
        }

        // 初始化執行
        document.addEventListener('DOMContentLoaded', () => {
            updateTeachGrid();
        });
    </script>
</body>
</html>

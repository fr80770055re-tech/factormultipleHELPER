<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公因數與公倍數濾鏡</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            touch-action: manipulation;
        }
        h1 { color: #333; margin-bottom: 10px; }
        
        .tab-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .tab-btn {
            padding: 12px 25px; font-size: 1.3rem; border: 2px solid transparent;
            border-radius: 12px; cursor: pointer; background-color: #e0e0e0; font-weight: bold;
        }
        .tab-btn.active { background-color: #4CAF50; color: white; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        
        .controls {
            background: white; padding: 20px; border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block;
            margin-bottom: 20px; width: 90%; max-width: 600px;
        }
        .input-group { display: flex; justify-content: center; gap: 20px; align-items: center; flex-wrap: wrap; margin-bottom: 15px;}
        
        /* 兩個數字的專屬顏色標籤 */
        .label-a { color: #1976D2; font-weight: bold; font-size: 1.2rem; }
        .label-b { color: #E64A19; font-weight: bold; font-size: 1.2rem; }
        
        input[type="number"] {
            font-size: 1.5rem; width: 70px; padding: 5px; text-align: center;
            border: 2px solid #ccc; border-radius: 8px; margin-left: 5px;
        }

        /* 百數表網格設計 */
        .chart-container {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 5px;
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: bold;
            color: #ccc; /* 預設為淡色，不干擾視覺 */
            border-radius: 6px;
            background-color: #f9f9f9;
            transition: all 0.3s ease;
        }

        /* 顏色標記邏輯 */
        .mark-a { background-color: #BBDEFB; color: #1565C0; border: 2px solid #90CAF9; } /* 數字A：淺藍 */
        .mark-b { background-color: #FFCCBC; color: #D84315; border: 2px solid #FFAB91; } /* 數字B：淺橘 */
        
        /* 交集：公因/公倍數 (綠色 + 放大跳動效果) */
        .mark-common {
            background-color: #4CAF50; 
            color: white; 
            border: 3px solid #2E7D32;
            transform: scale(1.1);
            z-index: 10;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            animation: pop 0.4s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1.1); }
        }

        /* 結果文字區 */
        .summary {
            margin-top: 20px;
            padding: 15px;
            background: #E8F5E9;
            border-radius: 10px;
            font-size: 1.2rem;
            line-height: 1.6;
            text-align: left;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .highlight-common { color: #2E7D32; font-weight: bold; font-size: 1.4rem;}
    </style>
</head>
<body>

    <h1>公因數與公倍數濾鏡</h1>

    <div class="tab-container">
        <button id="btnMultiple" class="tab-btn active">找公倍數</button>
        <button id="btnFactor" class="tab-btn">找公因數</button>
    </div>

    <div class="controls">
        <div class="input-group">
            <div class="label-a">數字 A: <input type="number" id="numA" value="3" min="1" max="100"></div>
            <div class="label-b">數字 B: <input type="number" id="numB" value="4" min="1" max="100"></div>
        </div>
        <div id="instruction" style="color: #666; font-size: 1.1rem;">正在尋找 3 和 4 的公倍數</div>
    </div>

    <div class="chart-container" id="chart"></div>

    <div class="summary" id="summaryBox"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let currentMode = 'multiple';
            const chart = document.getElementById('chart');
            const numAInput = document.getElementById('numA');
            const numBInput = document.getElementById('numB');
            const instruction = document.getElementById('instruction');
            const summaryBox = document.getElementById('summaryBox');
            
            const btnMultiple = document.getElementById('btnMultiple');
            const btnFactor = document.getElementById('btnFactor');

            // 初始化建立 100 個格子
            for (let i = 1; i <= 100; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.textContent = i;
                cell.id = `cell-${i}`;
                chart.appendChild(cell);
            }

            function switchMode(mode) {
                currentMode = mode;
                if (mode === 'multiple') {
                    btnMultiple.classList.add('active');
                    btnFactor.classList.remove('active');
                    numAInput.value = 3; // 預設值
                    numBInput.value = 4;
                } else {
                    btnFactor.classList.add('active');
                    btnMultiple.classList.remove('active');
                    numAInput.value = 12; // 預設值
                    numBInput.value = 18;
                }
                updateChart();
            }

            btnMultiple.addEventListener('click', () => switchMode('multiple'));
            btnFactor.addEventListener('click', () => switchMode('factor'));
            numAInput.addEventListener('input', updateChart);
            numBInput.addEventListener('input', updateChart);

            function updateChart() {
                let a = parseInt(numAInput.value) || 1;
                let b = parseInt(numBInput.value) || 1;
                
                // 範圍限制
                if(a > 100) { a = 100; numAInput.value = 100; }
                if(b > 100) { b = 100; numBInput.value = 100; }

                instruction.textContent = currentMode === 'multiple' 
                    ? `正在尋找 ${a} 和 ${b} 的公倍數` 
                    : `正在尋找 ${a} 和 ${b} 的公因數`;

                let listA = [];
                let listB = [];
                let listCommon = [];

                // 掃描 1 到 100
                for (let i = 1; i <= 100; i++) {
                    const cell = document.getElementById(`cell-${i}`);
                    // 重置樣式
                    cell.className = 'cell';

                    let isMatchA = false;
                    let isMatchB = false;

                    if (currentMode === 'multiple') {
                        // 倍數邏輯：格子號碼能被 a 或 b 整除
                        isMatchA = (i % a === 0);
                        isMatchB = (i % b === 0);
                    } else {
                        // 因數邏輯：a 或 b 能被格子號碼整除，且格子號碼不能大於目標數
                        isMatchA = (a % i === 0 && i <= a);
                        isMatchB = (b % i === 0 && i <= b);
                    }

                    if (isMatchA) listA.push(i);
                    if (isMatchB) listB.push(i);

                    // 套用顏色標記
                    if (isMatchA && isMatchB) {
                        cell.classList.add('mark-common');
                        listCommon.push(i);
                    } else if (isMatchA) {
                        cell.classList.add('mark-a');
                    } else if (isMatchB) {
                        cell.classList.add('mark-b');
                    }
                }

                // 更新文字總結
                if (currentMode === 'multiple') {
                    summaryBox.innerHTML = `
                        <div style="color: #1976D2;"><b>${a} 的倍數 (藍)：</b> ${listA.slice(0, 10).join(', ')}${listA.length > 10 ? '...' : ''}</div>
                        <div style="color: #E64A19;"><b>${b} 的倍數 (橘)：</b> ${listB.slice(0, 10).join(', ')}${listB.length > 10 ? '...' : ''}</div>
                        <div class="highlight-common" style="margin-top: 10px;"><b>共同的公倍數 (綠)：</b> ${listCommon.length > 0 ? listCommon.join(', ') : '100以內沒有'}</div>
                    `;
                } else {
                    let gcd = listCommon.length > 0 ? Math.max(...listCommon) : '無';
                    summaryBox.innerHTML = `
                        <div style="color: #1976D2;"><b>${a} 的因數 (藍)：</b> ${listA.join(', ')}</div>
                        <div style="color: #E64A19;"><b>${b} 的因數 (橘)：</b> ${listB.join(', ')}</div>
                        <div class="highlight-common" style="margin-top: 10px;"><b>共同的公因數 (綠)：</b> ${listCommon.join(', ')}</div>
                        <div style="color: #D81B60; font-weight: bold; margin-top: 5px;">最大公因數是：${gcd}</div>
                    `;
                }
            }

            // 啟動時繪製
            updateChart();
        });
    </script>
</body>
</html>

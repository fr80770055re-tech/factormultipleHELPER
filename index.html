<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>倍數掃雷陣</title>
    <style>
        /* 基礎排版與深色遊戲風格 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #2c3e50; 
            color: #ecf0f1;
            margin: 0;
            padding: 20px;
            touch-action: manipulation; /* 提升平板觸控體驗 */
        }
        h1 { color: #f1c40f; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin-bottom: 10px;}
        
        /* 遊戲資訊面板 */
        .dashboard {
            background: #34495e;
            padding: 15px 20px;
            border-radius: 15px;
            box-shadow: 0 6px 0 #1a252f, 0 10px 10px rgba(0,0,0,0.3);
            display: inline-block;
            margin-bottom: 25px;
            width: 90%;
            max-width: 500px;
        }
        
        .mission-text { font-size: 1.5rem; font-weight: bold; color: #3498db; margin-bottom: 10px; }
        .stats { display: flex; justify-content: space-around; font-size: 1.2rem; }
        .lives { color: #e74c3c; font-weight: bold; }
        .progress { color: #2ecc71; font-weight: bold; }

        /* 按鈕設計 */
        .btn-restart {
            background-color: #f39c12; color: white; border: none; padding: 10px 20px;
            font-size: 1.2rem; font-weight: bold; border-radius: 8px; cursor: pointer;
            margin-top: 15px; box-shadow: 0 4px 0 #d68910; transition: 0.1s;
        }
        .btn-restart:active { transform: translateY(4px); box-shadow: 0 0 0 #d68910; }

        /* 掃雷百數表網格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 6px;
            max-width: 600px;
            margin: 0 auto;
            background: #bdc3c7;
            padding: 10px;
            border-radius: 10px;
        }
        
        /* 單一方塊設計 */
        .cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            background-color: #ecf0f1;
            color: #2c3e50;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 0 #95a5a6;
            transition: all 0.1s;
            user-select: none;
        }
        .cell:active:not(.disabled) { transform: translateY(4px); box-shadow: 0 0 0 #95a5a6; }
        
        /* 點擊後的狀態樣式 */
        .cell.safe {
            background-color: #2ecc71; color: white;
            box-shadow: 0 2px 0 #27ae60; transform: translateY(2px); cursor: default;
        }
        .cell.mine {
            background-color: #e74c3c; color: white;
            box-shadow: 0 2px 0 #c0392b; transform: translateY(2px); cursor: default;
            animation: shake 0.4s;
        }
        .cell.disabled { pointer-events: none; opacity: 0.8; }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        /* 遊戲結束彈跳視窗 */
        .overlay-msg {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: rgba(0,0,0,0.9);
            padding: 30px; border-radius: 15px; z-index: 100;
            border: 4px solid #f1c40f; text-align: center; width: 80%; max-width: 400px;
        }
        .msg-title { font-size: 2.5rem; margin-bottom: 10px; }
        .win { color: #f1c40f; }
        .lose { color: #e74c3c; }
    </style>
</head>
<body>

    <h1>💣 倍數掃雷陣</h1>

    <div class="dashboard">
        <div class="mission-text" id="missionText">任務：找出所有 ? 的倍數</div>
        <div class="stats">
            <div class="lives">愛心：<span id="livesText">❤️❤️❤️</span></div>
            <div class="progress">已找到：<span id="foundCount">0</span> / <span id="totalCount">0</span></div>
        </div>
        <button class="btn-restart" onclick="initGame()">更換題目</button>
    </div>

    <div class="grid" id="grid"></div>

    <div class="overlay-msg" id="endGameMsg">
        <div class="msg-title" id="msgTitle"></div>
        <div style="font-size: 1.2rem; color: white; margin-bottom: 20px;" id="msgDesc"></div>
        <button class="btn-restart" onclick="initGame()">再玩一次</button>
    </div>

    <script>
        // 取得 HTML 元素
        const grid = document.getElementById('grid');
        const missionText = document.getElementById('missionText');
        const livesText = document.getElementById('livesText');
        const foundCount = document.getElementById('foundCount');
        const totalCount = document.getElementById('totalCount');
        const endGameMsg = document.getElementById('endGameMsg');
        const msgTitle = document.getElementById('msgTitle');
        const msgDesc = document.getElementById('msgDesc');

        // 遊戲狀態變數
        let targetMulti;
        let totalMultiples = 0;
        let found = 0;
        let lives = 3;
        let isGameOver = false;

        // 初始化遊戲
        function initGame() {
            endGameMsg.style.display = 'none';
            grid.innerHTML = '';
            found = 0;
            lives = 3;
            isGameOver = false;
            updateLivesUI();

            // 隨機決定要找 2 到 9 的倍數 (適合國小難度)
            targetMulti = Math.floor(Math.random() * 8) + 2; 
            missionText.innerHTML = `任務：找出所有 <span style="color:#f1c40f; font-size: 2rem;">${targetMulti}</span> 的倍數`;

            // 計算 1-100 總共有幾個目標數字的倍數
            totalMultiples = Math.floor(100 / targetMulti);
            foundCount.textContent = found;
            totalCount.textContent = totalMultiples;

            // 產生 100 個方塊
            for (let i = 1; i <= 100; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = i;
                
                // 綁定點擊事件
                cell.addEventListener('click', () => handleCellClick(cell, i));
                grid.appendChild(cell);
            }
        }

        // 處理方塊點擊
        function handleCellClick(cell, number) {
            if (isGameOver || cell.classList.contains('disabled')) return;

            if (number % targetMulti === 0) {
                // 點對了！(是倍數)
                cell.classList.add('safe', 'disabled');
                found++;
                foundCount.textContent = found;

                if (found === totalMultiples) {
                    triggerGameOver(true);
                }
            } else {
                // 踩到地雷！(不是倍數)
                cell.classList.add('mine', 'disabled');
                cell.textContent = '💣';
                lives--;
                updateLivesUI();

                if (lives <= 0) {
                    triggerGameOver(false);
                }
            }
        }

        // 更新愛心顯示
        function updateLivesUI() {
            livesText.textContent = '❤️'.repeat(lives) + '💔'.repeat(3 - lives);
        }

        // 觸發遊戲結束
        function triggerGameOver(isWin) {
            isGameOver = true;
            
            // 鎖定所有方塊，防止繼續點擊
            const allCells = document.querySelectorAll('.cell');
            allCells.forEach(c => c.classList.add('disabled'));

            endGameMsg.style.display = 'block';
            if (isWin) {
                msgTitle.textContent = '🎉 完美過關！';
                msgTitle.className = 'msg-title win';
                msgDesc.textContent = `太厲害了！你找出了所有 ${targetMulti} 的倍數。`;
            } else {
                msgTitle.textContent = '💥 任務失敗！';
                msgTitle.className = 'msg-title lose';
                msgDesc.textContent = `愛心扣光了，${targetMulti} 的倍數還差 ${totalMultiples - found} 個。`;
                
                // 失敗時的教學機制：把原本該點卻沒點到的正確答案亮成黃色
                allCells.forEach((c, index) => {
                    let num = index + 1;
                    if (num % targetMulti === 0 && !c.classList.contains('safe')) {
                        c.style.backgroundColor = '#f1c40f';
                        c.style.color = '#2c3e50';
                    }
                });
            }
        }

        // 網頁載入完成後自動啟動第一次遊戲
        window.onload = initGame;
    </script>
</body>
</html>
